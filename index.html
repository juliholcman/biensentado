<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bien Sentado | Sistema Base</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        beige: { 50: '#faf9f6', 100: '#f5f5f0', 200: '#ebebe4', 300: '#dfdfd5' },
                        wood: { light: '#d2b48c', DEFAULT: '#c2a077', dark: '#a68252' },
                        dark: '#1c1c1a',
                        success: '#2e7d32',
                        danger: '#c62828'
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        serif: ['Playfair Display', 'serif'],
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="style.css">

    <!-- LIBRERÍA DE SUPABASE -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-beige-100 text-dark antialiased min-h-screen pb-12">

    <!-- Header -->
    <header class="bg-white px-6 py-5 shadow-sm sticky top-0 z-10 flex justify-center items-center">
        <h1 class="font-serif text-3xl font-semibold tracking-wide text-dark select-none">
            BienSentado<span class="text-wood">.</span>
        </h1>
    </header>

    <!-- Navegación por Tabs -->
    <nav class="max-w-2xl mx-auto px-4 sm:px-6 mt-6">
        <div class="flex space-x-2 bg-beige-200 p-1 rounded-xl">
            <button id="btnTabCaja" class="flex-1 py-2 sm:py-3 text-sm sm:text-base font-semibold rounded-lg bg-white shadow text-dark transition-all">Registro y Caja</button>
            <button id="btnTabStock" class="flex-1 py-2 sm:py-3 text-sm sm:text-base font-medium rounded-lg text-gray-500 hover:text-dark transition-all">Inventario Actual</button>
        </div>
    </nav>

    <main class="max-w-2xl mx-auto px-4 sm:px-6 pt-6">
        
        <!-- ============================================== -->
        <!-- VISTA 1: CAJA Y REGISTRO                       -->
        <!-- ============================================== -->
        <div id="viewCaja">
            <!-- Formulario -->
            <section class="bg-white bg-opacity-80 backdrop-blur-md rounded-3xl p-6 sm:p-8 shadow-[0_8px_30px_rgb(0,0,0,0.04)] mb-8 border border-white relative">
                
                <!-- Indicador de Carga Bloqueante -->
                <div id="loadingOverlay" class="absolute inset-0 bg-white bg-opacity-70 backdrop-blur-sm rounded-3xl z-20 flex flex-col items-center justify-center hidden">
                    <svg class="animate-spin h-8 w-8 text-wood mb-2" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4v2H0c0 6.627 5.373 12 12 12v-4c-6.627 0-12-5.373-12-12h4z"></path></svg>
                    <span class="text-sm font-semibold text-dark tracking-wide">Procesando en Supabase...</span>
                </div>

                <h2 class="text-xl font-medium mb-6 flex items-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-wood"><rect width="18" height="18" x="3" y="4" rx="2" ry="2"/><line x1="16" x2="16" y1="2" y2="6"/><line x1="8" x2="8" y1="2" y2="6"/><line x1="3" x2="21" y1="10" y2="10"/><path d="M8 14h.01"/><path d="M12 14h.01"/><path d="M16 14h.01"/><path d="M8 18h.01"/><path d="M12 18h.01"/><path d="M16 18h.01"/></svg>
                    Registrar Operación (BD)
                </h2>
                
                <form id="registroForm" class="space-y-5">
                    
                    <!-- Tipo y Categoría (Caja) -->
                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-5">
                        <div class="space-y-1.5">
                            <label for="tipoMovimiento" class="block text-xs font-semibold text-gray-500 uppercase tracking-wider">Tipo (Caja)</label>
                            <select id="tipoMovimiento" required class="w-full px-4 py-3.5 bg-beige-50 border border-beige-200 rounded-xl focus:ring-2 focus:ring-wood transition-all outline-none appearance-none text-sm">
                                <option value="INGRESO">INGRESO (Venta / Cobro)</option>
                                <option value="EGRESO">EGRESO (Gasto / Pago)</option>
                            </select>
                        </div>
                        <div class="space-y-1.5">
                            <label for="categoria" class="block text-xs font-semibold text-gray-500 uppercase tracking-wider">Categoría</label>
                            <select id="categoria" required class="w-full px-4 py-3.5 bg-beige-50 border border-beige-200 rounded-xl focus:ring-2 focus:ring-wood transition-all outline-none appearance-none text-sm">
                                <!-- Llena JS localmente -->
                            </select>
                        </div>
                    </div>

                    <!-- NUEVOS CAMPOS: Producto y Cantidad -->
                    <div class="grid grid-cols-[1fr_100px] sm:grid-cols-[1fr_120px] gap-3 sm:gap-5 p-4 bg-beige-100 rounded-2xl border border-beige-200">
                        <div class="space-y-1.5">
                            <label for="productoSelect" class="block text-[10px] sm:text-xs font-semibold text-gray-500 uppercase tracking-wider">📦 Producto a Mover (Opcional)</label>
                            <select id="productoSelect" class="w-full px-3 sm:px-4 py-3.5 bg-white border border-beige-200 rounded-xl focus:ring-2 focus:ring-wood transition-all outline-none appearance-none text-sm max-w-full truncate">
                                <option value="NONE">- Sin Producto (Solo Dinero) -</option>
                                <!-- Llena Supabase -->
                            </select>
                        </div>
                        <div class="space-y-1.5">
                            <label for="cantidad" class="block text-[10px] sm:text-xs font-semibold text-gray-500 uppercase tracking-wider">CANT.</label>
                            <input type="number" id="cantidad" min="1" value="1" disabled class="w-full px-3 sm:px-4 py-3.5 bg-white border border-beige-200 rounded-xl focus:ring-2 focus:ring-wood transition-all outline-none text-sm font-medium text-center disabled:opacity-50 disabled:bg-beige-50">
                        </div>
                    </div>

                    <!-- Detalle -->
                    <div class="space-y-1.5 pt-2">
                        <label for="detalle" class="block text-xs font-semibold text-gray-500 uppercase tracking-wider">Detalle / Concepto</label>
                        <input type="text" id="detalle" required placeholder="Ej. Venta Juan Pérez DNI 39..." class="w-full px-4 py-3.5 bg-beige-50 border border-beige-200 rounded-xl focus:ring-2 focus:ring-wood transition-all outline-none text-sm">
                    </div>

                    <!-- Monto, Medio y Fecha -->
                    <div class="grid grid-cols-2 gap-3 sm:gap-5">
                        <div class="col-span-2 sm:col-span-1 space-y-1.5">
                            <label for="monto" class="block text-xs font-semibold text-gray-500 uppercase tracking-wider">Monto</label>
                            <div class="relative">
                                <span class="absolute left-4 top-1/2 transform -translate-y-1/2 text-gray-500 font-medium">$</span>
                                <input type="number" id="monto" required min="0" step="0.01" placeholder="0.00" class="w-full pl-9 pr-4 py-3.5 bg-beige-50 border border-beige-200 rounded-xl focus:ring-2 focus:ring-wood transition-all outline-none text-sm sm:text-base font-medium">
                            </div>
                        </div>
                        <div class="space-y-1.5">
                            <label for="medioPago" class="block text-xs font-semibold text-gray-500 uppercase tracking-wider">Medio Pago</label>
                            <select id="medioPago" required class="w-full px-4 py-3.5 bg-beige-50 border border-beige-200 rounded-xl focus:ring-2 focus:ring-wood transition-all outline-none appearance-none text-sm">
                                <option value="Efectivo">Efectivo</option>
                                <option value="MercadoPago">MercadoPago</option>
                                <option value="Transferencia Bancaria">Transf. Bancaria</option>
                                <option value="Tarjeta">Tarjeta (Cred/Deb)</option>
                            </select>
                        </div>
                        <div class="space-y-1.5">
                            <label for="fecha" class="block text-xs font-semibold text-gray-500 uppercase tracking-wider">Fecha</label>
                            <input type="date" id="fecha" required class="w-full px-4 py-3.5 bg-beige-50 border border-beige-200 rounded-xl focus:ring-2 focus:ring-wood transition-all outline-none text-sm">
                        </div>
                    </div>

                    <div class="pt-4">
                        <button type="submit" class="w-full py-4 bg-dark text-white rounded-xl font-medium tracking-wide hover:bg-black transform active:scale-[0.98] transition-all shadow-md flex items-center justify-center gap-2">
                            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
                            GUARDAR EN NUBE
                        </button>
                    </div>
                </form>
            </section>

            <!-- Visualización - Caja Real Supabase -->
            <section class="bg-white rounded-3xl p-6 sm:p-8 shadow-[0_8px_30px_rgb(0,0,0,0.04)] hidden" id="cajaSection">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-xl font-medium">Historial de Caja Nube</h2>
                    <span class="text-xs bg-beige-200 text-gray-600 px-3 py-1 rounded-full font-medium" id="statusCaja">Cargando...</span>
                </div>
                
                <div class="overflow-x-auto -mx-6 sm:mx-0">
                    <div class="inline-block min-w-full align-middle px-6 sm:px-0">
                        <table class="min-w-full divide-y divide-beige-200">
                            <thead>
                                <tr>
                                    <th class="py-3 text-left text-[10px] sm:text-xs font-semibold text-gray-500 uppercase tracking-wider">Fecha</th>
                                    <th class="py-3 text-left text-[10px] sm:text-xs font-semibold text-gray-500 uppercase tracking-wider">Detalle</th>
                                    <th class="py-3 text-right text-[10px] sm:text-xs font-semibold text-gray-500 uppercase tracking-wider">Monto</th>
                                    <th class="py-3 w-10"></th>
                                </tr>
                            </thead>
                            <tbody id="tablaMovimientos" class="divide-y divide-beige-100">
                                <!-- Se llena desde Supabase -->
                            </tbody>
                        </table>
                    </div>
                </div>

                <div class="mt-8 p-5 bg-beige-50 border border-beige-200 rounded-2xl flex flex-col sm:flex-row justify-between items-center sm:items-end gap-3">
                    <div class="text-sm text-gray-500 font-medium tracking-wide">BALANCE HISTÓRICO TOTAL</div>
                    <div id="balanceTotal" class="text-3xl font-bold font-serif text-dark">$ ...</div>
                </div>
            </section>
        </div>

        <!-- ============================================== -->
        <!-- VISTA 2: INVENTARIO ACTUAL                     -->
        <!-- ============================================== -->
        <div id="viewStock" class="hidden">
            <section class="bg-white rounded-3xl p-6 sm:p-8 shadow-[0_8px_30px_rgb(0,0,0,0.04)] min-h-[500px]">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-xl sm:text-2xl font-medium">📦 Inventario en Tiempo Real</h2>
                    <div class="flex gap-2">
                        <button id="btnToggleNuevoProd" class="px-4 py-2 bg-dark text-white text-sm font-medium rounded-lg hover:bg-black transition-all">
                            + Nuevo Producto
                        </button>
                        <button id="btnActualizarStock" title="Actualizar Datos" class="p-2 bg-beige-50 rounded-lg hover:bg-beige-200 transition-colors text-wood">
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
                        </button>
                    </div>
                </div>

                <!-- Formulario Nuevo Producto (Oculto) -->
                <form id="formNuevoProducto" class="hidden flex flex-col sm:flex-row flex-wrap gap-3 mb-6 p-4 sm:p-5 bg-beige-50 rounded-2xl border border-beige-200">
                    <input type="text" id="nuevoProdNombre" placeholder="Nombre (ej. Mesa Vintage)" required class="flex-1 px-4 py-3 bg-white border border-beige-200 rounded-xl focus:ring-2 focus:ring-wood transition-all outline-none text-sm min-w-[200px]">
                    <select id="nuevoProdColor" class="w-full sm:w-32 px-4 py-3 bg-white border border-beige-200 rounded-xl focus:ring-2 focus:ring-wood transition-all outline-none text-sm cursor-pointer">
                        <option value="">- Sin Color -</option>
                        <option value="Blanco">Blanco</option>
                        <option value="Negro">Negro</option>
                        <option value="Gris">Gris</option>
                        <option value="Madera">Madera</option>
                        <option value="Transparente">Transparente</option>
                    </select>
                    <input type="text" id="nuevoProdCat" placeholder="Categoría" required class="w-full sm:w-32 px-4 py-3 bg-white border border-beige-200 rounded-xl focus:ring-2 focus:ring-wood transition-all outline-none text-sm">
                    <input type="number" id="nuevoProdStock" placeholder="Stock Inicial" min="0" value="0" required class="w-full sm:w-32 px-4 py-3 bg-white border border-beige-200 rounded-xl focus:ring-2 focus:ring-wood transition-all outline-none text-sm">
                    
                    <button type="submit" class="px-6 py-3 bg-success text-white text-sm font-medium rounded-xl hover:opacity-90 transition-all shadow-sm w-full sm:w-auto">
                        Añadir Catálogo
                    </button>
                </form>

                <div class="overflow-x-auto -mx-6 sm:mx-0">
                    <div class="inline-block min-w-full align-middle px-6 sm:px-0">
                        <table class="min-w-full divide-y divide-beige-200 border-b border-beige-100">
                            <thead>
                                <tr>
                                    <th class="py-4 text-left text-[11px] sm:text-xs font-semibold text-gray-400 uppercase tracking-wider">Producto (Catálogo)</th>
                                    <th class="py-4 text-left text-[11px] sm:text-xs font-semibold text-gray-400 uppercase tracking-wider hidden sm:table-cell">Categoría</th>
                                    <th class="py-4 text-center text-[11px] sm:text-xs font-bold text-gray-500 uppercase tracking-wider bg-beige-50 px-3 rounded-t-lg border-x border-t border-beige-100">Stock</th>
                                    <th class="py-4 text-right text-[11px] sm:text-xs font-semibold text-gray-400 uppercase tracking-wider pl-2">Acción</th>
                                </tr>
                            </thead>
                            <tbody id="tablaStockActual" class="divide-y divide-beige-100">
                                <tr><td colspan="3" class="text-center py-8 text-sm text-gray-400">Autenticando con Supabase...</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </section>
        </div>

    </main>

    <script src="main.js"></script>
</body>
</html>
